<script>
  document.addEventListener("DOMContentLoaded", function() {
    const myLink = document.getElementById("myLink");
    const originalContent = document.getElementById("originalContent");
    const secretContent = document.getElementById("secretContent");

    // Function that actually swaps the text
    function revealSecretContent() {
      if (sessionStorage.getItem("linkClicked") === "true") {
        if (originalContent) originalContent.style.display = "none";
        if (secretContent) secretContent.style.display = "block";
      }
    }

    // 1. Check immediately when the page loads (for desktop/same tab)
    revealSecretContent();

    // 2. Listen for the click to set the flag
    if (myLink) {
      myLink.addEventListener("click", function() {
        sessionStorage.setItem("linkClicked", "true");
      });
    }

    // 3. MOBILE FIX: Check if the user switched back to this tab
    document.addEventListener("visibilitychange", function() {
      if (document.visibilityState === "visible") {
        revealSecretContent(); // Run the check the moment they view the tab again
      }
    });
  });
</script>
    <script>
  document.addEventListener("DOMContentLoaded", function() {
    const myLink = document.getElementById("myLink");
    const originalContent = document.getElementById("originalContent");
    const secretContent = document.getElementById("secretContent");
    const backToMainBtn = document.getElementById("backToMainBtn"); // Find the new button

    function revealSecretContent() {
      if (sessionStorage.getItem("linkClicked") === "true") {
        if (originalContent) originalContent.style.display = "none";
        if (secretContent) secretContent.style.display = "block";
      }
    }

    revealSecretContent();

    if (myLink) {
      myLink.addEventListener("click", function() {
        sessionStorage.setItem("linkClicked", "true");
      });
    }

    document.addEventListener("visibilitychange", function() {
      if (document.visibilityState === "visible") {
        revealSecretContent();
      }
    });

    // RESET LOGIC: When they click the button, clear memory and reload
    if (backToMainBtn) {
      backToMainBtn.addEventListener("click", function() {
        sessionStorage.removeItem("linkClicked"); // Erases the "clicked" memory
        location.reload();                        // Reloads the page back to normal
      });
    }
  });
</script>
